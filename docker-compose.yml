services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgcx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgcx}
      POSTGRES_DB: ${POSTGRES_DB:-sgcx}
    ports:
      - "5432:5432"
    volumes:
      - sgcx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgcx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["sh", "-c", "npx prisma db push --schema prisma/schema.prisma && node dist/main.js"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sgcx}:${POSTGRES_PASSWORD:-sgcx}@postgres:5432/${POSTGRES_DB:-sgcx}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-please-change-this-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@sgcx.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ChangeMe123!}
      TELEMETRY_HZ: ${TELEMETRY_HZ:-20}
      SIMULATION_MAX_DRONES: ${SIMULATION_MAX_DRONES:-200}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

  simulation:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["sh", "-c", "npx prisma db push --schema prisma/schema.prisma && node dist/simulation-runner.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sgcx}:${POSTGRES_PASSWORD:-sgcx}@postgres:5432/${POSTGRES_DB:-sgcx}?schema=public
      REDIS_URL: redis://redis:6379
      TELEMETRY_HZ: ${TELEMETRY_HZ:-20}
      SIMULATION_MAX_DRONES: ${SIMULATION_MAX_DRONES:-200}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-in-prod}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@sgcx.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ChangeMe123!}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  sgcx_postgres_data:
